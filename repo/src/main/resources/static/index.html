<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Booking Portal</title>
    <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- Login Page -->
<div id="login-page" class="login-container hidden">
    <div class="login-box" id="login-box">
        <!-- Login Section -->
        <div id="login-section">
            <h1>Booking Portal</h1>
            <p class="subtitle">Sign in to manage your bookings</p>
            <div id="login-error" class="alert alert-error hidden"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" class="form-control" id="login-username" placeholder="Enter username" required/>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" class="form-control" id="login-password" placeholder="Enter password" required/>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
                <p class="mt-1 text-muted" style="text-align:center;font-size:0.85rem;">
                    Don't have an account? <a href="#" id="show-register">Register</a>
                </p>
            </form>
        </div>

        <!-- Register Section -->
        <div id="register-section" class="hidden">
            <h1>Register</h1>
            <p class="subtitle">Create a new customer account</p>
            <div id="register-error" class="alert alert-error hidden"></div>
            <form id="register-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" id="reg-username" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" id="reg-email" required/>
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="reg-fullname" required/>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" class="form-control" id="reg-phone"/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="reg-password" required minlength="6"/>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Register</button>
                <p class="mt-1 text-muted" style="text-align:center;font-size:0.85rem;">
                    Already have an account? <a href="#" id="show-login">Sign In</a>
                </p>
            </form>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="app-main" class="hidden">
    <header class="app-header">
        <h1>Booking Portal</h1>
        <nav id="main-nav"></nav>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-sm btn-outline" style="color:white;border-color:rgba(255,255,255,0.3);" onclick="App.logout()">Logout</button>
        </div>
    </header>
    <main class="container" id="page-content"></main>
</div>

<script src="/static/js/jquery-3.7.1.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
