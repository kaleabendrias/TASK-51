<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Booking Portal</title>
    <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- Login Page -->
<div id="login-page" class="login-container hidden">
    <div class="login-box" id="login-box">
        <div id="login-section">
            <h1>Booking Portal</h1>
            <p class="subtitle">Sign in to manage your bookings</p>
            <div id="login-error" class="alert alert-error hidden"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" class="form-control" id="login-username" placeholder="Enter username" required/>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" class="form-control" id="login-password" placeholder="Enter password" required/>
                </div>
                <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Sign In</button>
                <p class="mt-1 text-muted text-center" style="font-size:.82rem">
                    Don't have an account? <a href="#" id="show-register">Register</a>
                </p>
            </form>
        </div>
        <div id="register-section" class="hidden">
            <h1>Register</h1>
            <p class="subtitle">Create a new customer account</p>
            <div id="register-error" class="alert alert-error hidden"></div>
            <form id="register-form">
                <div class="form-group"><label>Username</label><input type="text" class="form-control" id="reg-username" data-validate="required,minlen:3"/><div class="invalid-feedback"></div></div>
                <div class="form-group"><label>Email</label><input type="email" class="form-control" id="reg-email" data-validate="required,email"/><div class="invalid-feedback"></div></div>
                <div class="form-group"><label>Full Name</label><input type="text" class="form-control" id="reg-fullname" data-validate="required"/><div class="invalid-feedback"></div></div>
                <div class="form-group"><label>Phone</label><input type="tel" class="form-control" id="reg-phone" data-validate="phone"/><div class="invalid-feedback"></div></div>
                <div class="form-group"><label>Password</label><input type="password" class="form-control" id="reg-password" data-validate="required,minlen:6"/><div class="invalid-feedback"></div></div>
                <button type="submit" class="btn btn-primary w-full" style="justify-content:center">Register</button>
                <p class="mt-1 text-muted text-center" style="font-size:.82rem">
                    Already have an account? <a href="#" id="show-login">Sign In</a>
                </p>
            </form>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="app-main" class="hidden">
    <header class="app-header">
        <h1>Booking Portal</h1>
        <nav id="main-nav"></nav>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-sm btn-outline" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="App.logout()">Logout</button>
        </div>
    </header>
    <main class="container" id="page-content"></main>
</div>

<script src="/static/js/jquery-3.7.1.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
